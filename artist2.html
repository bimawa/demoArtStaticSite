<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Художник 2 - Галерея</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div id="password-gate">
      <div class="gate-card">
        <h1>Художник 2</h1>
        <p>Введите пароль для доступа</p>
        <input type="password" id="gate-password" placeholder="Пароль" />
        <button type="button" id="gate-submit">Войти</button>
        <p id="gate-error" class="error hidden">Неверный пароль</p>
      </div>
    </div>

    <div id="main-content" class="hidden">
      <header class="site-header">
        <nav class="site-nav">
          <a class="brand" href="index.html">Галерея</a>
          <ul>
            <li><a href="index.html">Главная</a></li>
            <li><a href="artist1.html">Художник 1</a></li>
            <li><a href="artist2.html">Художник 2</a></li>
            <li><a href="artist3.html">Художник 3</a></li>
            <li><a href="#" onclick="logout(); return false;">Выйти</a></li>
          </ul>
        </nav>
      </header>

      <main>
        <section class="artist-header">
          <h1>Художник 2</h1>
          <p class="artist-title">Графика</p>
        </section>

        <section>
          <div class="artist-bio">
            <p>Биография художника. Здесь будет информация о творческом пути, достижениях, выставках и вдохновении.</p>
          </div>
        </section>

        <section class="artist-section">
          <h2>Работы</h2>
          <div class="gallery-grid">
            <figure class="gallery-item">
              <img src="https://images.pexels.com/photos/36430103/pexels-photo-36430103.jpeg" alt="Работа 1" />
              <figcaption>
                <h3>Название работы 1</h3>
                <p>2024, бумага, тушь</p>
              </figcaption>
            </figure>
            <figure class="gallery-item">
              <img src="https://cdn.pixabay.com/photo/2023/05/11/13/21/digitalart-7986416_1280.jpg" alt="Работа 2" />
              <figcaption>
                <h3>Название работы 2</h3>
                <p>2024, бумага, карандаш</p>
              </figcaption>
            </figure>
            <figure class="gallery-item">
              <img src="https://images.pexels.com/photos/36746455/pexels-photo-36746455.jpeg" alt="Работа 3" />
              <figcaption>
                <h3>Название работы 3</h3>
                <p>2023, бумага, перо</p>
              </figcaption>
            </figure>
          </div>
        </section>

        <section class="artist-section">
          <h2>Видео</h2>
          <div class="video-grid">
            <figure class="video-item">
              <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="Видео 1" allowfullscreen></iframe>
              <figcaption>
                <h3>Мастер-класс по графике</h3>
                <p>Техники и приёмы</p>
              </figcaption>
            </figure>
          </div>
        </section>
      </main>

      <footer>
        <p>&copy; 2026 Галерея Художников</p>
      </footer>
    </div>

    <script src="js/main.js"></script>
    <script>
      const passwords = {
        'artist1': 'art2026a',
        'artist2': 'art2026b', 
        'artist3': 'art2026c',
        'main': 'gallery2026'
      };

      const currentPage = window.location.pathname.split('/').pop() || 'index.html';
      const pageKey = currentPage.replace('.html', '');
      
      function checkPassword(password) {
        if (password === passwords.main) {
          return 'main';
        }
        if (password === passwords.artist1) {
          return 'artist1';
        }
        if (password === passwords.artist2) {
          return 'artist2';
        }
        if (password === passwords.artist3) {
          return 'artist3';
        }
        return null;
      }

      function showContent(allowedPage) {
        document.getElementById('password-gate').classList.add('hidden');
        document.getElementById('main-content').classList.remove('hidden');
        localStorage.setItem('gallery-auth', allowedPage);
      }

      function logout() {
        localStorage.removeItem('gallery-auth');
        window.location.reload();
      }

      const savedAuth = localStorage.getItem('gallery-auth');
      
      if (savedAuth === 'main') {
        window.location.href = 'index.html';
      } else if (savedAuth === 'artist1') {
        window.location.href = 'artist1.html';
      } else if (savedAuth === 'artist2') {
        showContent(savedAuth);
        document.querySelector('.site-nav li:nth-child(2)').style.display = 'none';
        document.querySelector('.site-nav li:nth-child(4)').style.display = 'none';
      } else if (savedAuth === 'artist3') {
        window.location.href = 'artist3.html';
      }

      document.getElementById('gate-submit').addEventListener('click', function() {
        const password = document.getElementById('gate-password').value;
        const allowed = checkPassword(password);
        if (allowed) {
          if (allowed === 'main') {
            window.location.href = 'index.html';
          } else {
            showContent(allowed);
          }
        } else {
          document.getElementById('gate-error').classList.remove('hidden');
        }
      });

      document.getElementById('gate-password').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          document.getElementById('gate-submit').click();
        }
      });
    </script>
  </body>
</html>
